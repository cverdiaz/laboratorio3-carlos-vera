# ============================================================
# AGENTE KUBERNETES TEMPORAL PARA JENKINS
# Jenkins creará un pod basado en esta plantilla al iniciar
# el pipeline y lo eliminará cuando termine la ejecución.
# ============================================================
apiVersion: v1
kind: Pod
metadata:
  labels:
    app: jenkins-lab3-agent

spec:
  # Los contenedores comparten el workspace con UID/GID 1000.
  securityContext:
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000

  serviceAccountName: jenkins-lab3-agent
  restartPolicy: Never

  containers:
    # --------------------------------------------------------
    # NODE
    # Instala dependencias, ejecuta pruebas y compila NestJS.
    # --------------------------------------------------------
    - name: node
      image: node:24-alpine
      imagePullPolicy: IfNotPresent
      command:
        - cat
      tty: true
      workingDir: /home/jenkins/agent

    # --------------------------------------------------------
    # BUILDKIT
    # Construye y publica la imagen Docker.
    # Se ejecuta como root y privilegiado únicamente dentro
    # del agente efímero del laboratorio local.
    # --------------------------------------------------------
    - name: buildkit
      image: moby/buildkit:v0.28.0
      imagePullPolicy: IfNotPresent
      command:
        - cat
      tty: true
      workingDir: /home/jenkins/agent
      securityContext:
        privileged: true
        runAsUser: 0
        runAsGroup: 0

    # --------------------------------------------------------
    # KUBECTL
    # Aplica los manifiestos y verifica el despliegue.
    # --------------------------------------------------------
    - name: kubectl
      image: bitnami/kubectl:latest
      imagePullPolicy: IfNotPresent
      command:
        - cat
      tty: true
      workingDir: /home/jenkins/agent
